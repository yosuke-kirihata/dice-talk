name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset=dice-talk-v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Check existing tag
        id: tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release tag ${{ steps.version.outputs.tag }} already exists. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.tag.outputs.exists == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        if: steps.tag.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.tag.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.tag.outputs.exists == 'false'
        run: pnpm lint

      - name: Test
        if: steps.tag.outputs.exists == 'false'
        run: pnpm test

      - name: Build
        if: steps.tag.outputs.exists == 'false'
        run: pnpm build

      - name: Archive dist
        if: steps.tag.outputs.exists == 'false'
        run: |
          cd dist
          zip -r "../${{ steps.version.outputs.asset }}" .

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            Automated release for `${{ steps.version.outputs.tag }}`.

            Commit: `${{ github.sha }}`
          files: ${{ steps.version.outputs.asset }}
